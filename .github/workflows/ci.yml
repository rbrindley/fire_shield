name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend (build + audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Audit npm dependencies
        run: npm audit --omit=dev 2>&1 || echo "::warning::npm audit found vulnerabilities — review above"

  # ── MCP Server ────────────────────────────────────────────────────────
  mcp-server:
    name: MCP Server (audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp_server
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp_server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --omit=dev 2>&1 || echo "::warning::npm audit found vulnerabilities — review above"

  # ── Backend ───────────────────────────────────────────────────────────
  backend:
    name: Backend (audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"

      - name: Install from lockfile
        run: pip install --no-deps --require-hashes -r requirements.lock

      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          pip-audit -r requirements.lock --desc 2>&1 || echo "::warning::pip-audit found vulnerabilities — review above"

  # ── Quarantine Gate ───────────────────────────────────────────────────
  package-quarantine:
    name: Package quarantine (7-day age gate)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"

      - name: Check for quarantine override label
        if: contains(github.event.pull_request.labels.*.name, 'quarantine-override')
        run: echo "QUARANTINE_OVERRIDE=true" >> "$GITHUB_ENV"

      - name: Check package publication age
        run: bash .github/scripts/check-package-age.sh 7
